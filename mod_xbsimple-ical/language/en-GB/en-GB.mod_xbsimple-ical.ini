XBSCICAL_DEFAULT_COMPS=""
XBSICAL_END_OR_DUR="EndTime or Duration"
XBSICAL_END_OR_DUR_DESC="Select to either ignore any end time or duration supplied, or to display as time or as duration whichever is presented. Duration will display as minutes if less than an hour, or Hour(s) &amp; Mins. End time will always be ignored if it is the same as start time"
XBSICAL_IGNORE_END="Ignore (hide) End/Duration"
XBSICAL_END_AS_TIME="End as Time"
XBSICAL_END_AS_DURATION="End as Duration"
XBSICAL_DURATION_FMT="Duration Format"
XBSICAL_DURATION_FMT_DESC="Default format will display as (eg) <code>2hrs 36mins</code>. Use the prefix field in the component selector to include text before time (eg ' for ')"

XBSICAL_LAYOUT_OPTS_NOTE="<span style='font-size:1.1rem;font-weight:bold;'>Layout Options</span><div style='padding-left:40px;' >These options specify which calendar components are displayed in each section. If no components are selected for an option that section will not be displayed. A component can appear in more than one section</div>"

XBSICAL_SECTION_OPTS_NOTE="<details><summary style='font-size:1.0rem;font-weight:bold;'>Section Options Note</summary>The display for each event is divided into 4 sections - Head, Title, Info, & Details. The following Calendar Components can be assigned to each section - StartDate (DTSTART), EndDate (DTEND or DURATION), StartTime, EndTime, Summary, Location, Categories, Description. Currently other VEVENT components are not displayed.<br />You can set the order components are displayed in a section by dragging and dropping in the table. For each component you can specify prefix and suffix text including simple html like  &lt;b&gt; &lt;i&gt; &lt;br /&gt;br for space us ' ' or &amp;nbsp;. By default components will be sparated with a single simple (breaking) space. <br />NB Events will always be presented in date order with today at the top of the list.<br />Each Section of the event display has its own CSS class in the module stylesheet - you can easily modify this by adding your own module class name in the Advance config tab for the module instance and using that as a selector for css in the template user.css file (or elsewhere).</details>"
XBSICAL_HEADER_SHOW="Group events by day"
XBSICAL_HEADER_SHOW_DESC="Events on the same day can be grouped in a frame under a single date heading, or each event can have its own frame"
XBSICAL_HIDE_HEAD="No Header"
XBSICAL_GROUP_DATE="Group by Date"

XBSICAL_SPECIFY_COMPS="Specify Components"

XBSICAL_HEAD_DATE_FMT="Header Date format"
XBSICAL_HEAD_DATE_FMT_DESC="Enter text to format date. Default gives 'Mon 4th of Dec' If EndDate is also showing then it will use same format and be separated by ' - '. For formatting codes see 'Date &amp; Time Formatting' below"

XBSICAL_HEAD_GROUP_OPTS="Date Group Options"
XBSICAL_HEAD_GROUP_OPTS_DESC="For events where EndDate is same as StartDate then only StartDate will be shown. If you have multiday events then the 'StartDate to EndDate' option will group events with the same period separately from single day events or events with the same start but different end dates. Otherwise only StartDate will show and be used for grouping all events."
XBSICAL_START_ONLY="StartDate only"
XBSICAL_START_END="Start &amp; End"

XBSICAL_HEAD_COMPS="Header Components"
XBSICAL_HEAD_COMPS_DESC="Header section is typically used for some combination of Date(s) and Times. Use the prefix and suffix to specify linking text or puncutation"
XBSICAL_PRESUF_HINT="text, simple html allowed"
XBSICAL_CAL_COMPS="Calendar Components"

XBSICAL_TITLE_SHOW="Title Display"
XBSICAL_TITLE_SHOW_DESC="Typically title section will include just the summary. The default CSS is <code>{font-size:1.1rem; text-transform: uppercase;}</code>. Other components can be added, use prefix and suffix to specify linking text or line breaks as required"

XBSICAL_TITLE_DATE_FMT="Title Date format"
XBSICAL_DATE_FMT_DESC="Enter text to format date. Default gives '4th Dec' If EndDate is also showing then it will use same format and be separated by ' - '. For formatting codes see 'Date &amp; Time Formatting' below"
XBSICAL_TITLE_TIME_FMT="Title Time format"
XBSICAL_TIME_FMT_DESC="Enter text to format time. Default gives 'HH:MM'. For formatting codes see 'Date &amp; Time Formatting' below"

XBSICAL_TITLE_COMPS="Title components"
XBSICAL_TITLE_COMPS_DESC="Choose components to display in title area"

XBSICAL_INFO_SHOW="Info Section Display"
XBSICAL_INFO_SHOW_DESC="The info section is intended to occupy ony one or two lines - if you want to display the Description component it may be better to use the details section where the text can be a hidden dropdown or popover behind a link. The info section is formated by default as plain text size 1.0rem"

XBSICAL_INFO_DATE_FMT="Info Date format"
XBSICAL_INFO_TIME_FMT="Info Time format"

XBSICAL_INFO_COMPS="Info components"
XBSICAL_INFO_COMPS_DESC="Choose components to display in Info section which appears beneath the title"


XBSICAL_DETS_SHOW="Details Section Display"
XBSICAL_DETS_SHOW_DESC="The Details section can be displayed as a dropdown, a mouse-over popup, of as full expanded text. Details section defaults to 0.9rem plain text. Components specified here will display on all events if they exist for the event. If using the full text option you probably don't want it to occupy more than a couple of lines. For more complex information like Description use dropdown or popover so that it doesn't occupy screen space until expanded."
XBSICAL_DETS_DATE_FMT="Details Date format"
XBSICAL_DETS_TIME_FMT="Details Time format"
XBSICAL_DETS_COMPS="Details components"
XBSICAL_DETS_COMPS_DESC="Choose components to display in more details area"
XBSICAL_DETS_INTRO_TEXT="Details intro text"
XBSICAL_DETS_INTRO_TEXT_DESC="Enter prompt to click or hover over to display full text"

XBSICAL_DETS_PROMPT="Prompt Text"
XBSICAL_DETS_PROMPT_DESC="Text to triger dropdown or popover"

XBSICAL_WARN_NO_SECTIONS="<div class='alert alert-error' style='font-size:1.0rem;'><b>Warning</b><br /> - you do not have any selections selected to display. Nothing will show!</div>"
XBSICAL_TIMEFORMAT_HELP="<details><summary style='font-size:1.0rem;'><b>DateTime Formating</b></summary>Simple cheat sheet - more options exist<ul><li>Day = 'd': 2 digit, 'j': no leading zero, 'D' 3 letter text, 'l': full text, 'S' ordinal suffix (use with 'j')</li><li>Month = 'm': 2 digit, 'n': no leading zero, 'M': 3 letter text, 'F': full text</li><li>Year = 'y': 2 digit year, 'Y': 4 digit year</li><li>Hour = 'h': 2 digit 12 hour, 'H': 2 digit 24 hour, 'g': no leading zero 12 hour, G no leading zero 24 hour, 'a': am / pm, 'A': AM / PM </li><li>Minute = 'i': 2 digit minutes, Second: 's': 2 digit seconds</li></ul>To include text escape with preceeding backslash any character used as format specifier (eg ' \of ' for ' of '). You can include simple html format tags (eg &lt;b&gt; or &lt;\i&gt;)</details>"

;fieldset css styles
XBSICAL_CSS_HELP="<details><summary style='font-size:1.0rem;'><b>Module CSS Styles</b></summary>Default styles for each section are as noted in the Layout Options descriptions. Here you can define a class name to apply to the whole module body, and additional class names to apply to each section, or you can specify inline CSS styles to apply to the section divs. If you define new class names it will be easiest to insert them into your site template <code>user.css</code>. If you edit the module css in <code>/media/mod_xbsimple-ical/css/xbsimpleical.css</code> it may be overwritten by a subsequent update of the module</details>"

XBSICAL_DEFAULT_STYLES="<details><summary style='font-size:1.0rem;'>Default class names used for the sections</summary><ul><li>xbsical-head : text bold 1.0rem</li><li>xbscical-title : text transform uppercase 1.1rem</li><li>xbscical-info : normal text</li><li>xbscical-details : text size 0.9rem</li></ul>Examine <code>/media/mod_xbsimple-ical/css/xbsimpleical.css</code> for full details</details>"

