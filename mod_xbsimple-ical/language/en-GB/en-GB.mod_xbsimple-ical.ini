;config params Documentation
MOD_SIMPLEICALBLOCK_TITLE_AND_SHOW_HELP="<details><summary><b>Title and show title</b></summary>System fields, display depends on module style (tab Advanced) works e.g. with System style: html5; not with System style: none</details>"
MOD_SIMPLEICALBLOCK_CALENDAR_ID_HELP="<details><summary><b>Calendar ID(s)</b></summary>The Google calendar ID, or the URL of the iCal file to display. You can also use #example to get example events.<br>Or a comma separated list of ID's <br>Optional you can add a html-class separated by a semicolon to some or all ID's to distinguish the descent in the lay-out of the event."
MOD_SIMPLEICALBLOCK_EVENT_COUNT_HELP="The maximum number of events to display."
MOD_SIMPLEICALBLOCK_EVENT_PERIOD_HELP="Last date to display events in number of days after today."
MOD_SIMPLEICALBLOCK_SIB_LAYOUT_HELP="Lay-out, order/level of startdate and summary<br>Start with startdate on higher level, Start with summary before first date line or (default) summary after first date line."
MOD_SIMPLEICALBLOCK_DATEFORMAT_LG_HELP="Start date format first (date) line. Default: l jS \of F,<br>l = day of the week (Monday); j =  day of the month (25) F = name of month (december)<br>y or Y = Year (17 or 2017);<br>fill with only &lt;&gt; (not allowed tag filtered from output) if you don't want to show this date.<br>Although this is intended for date all date and time fields contain date and time so you can als use time formats in date fields and date formats in time field<br>You can also use other text or simple html tags to embellish or emphasize it<br>escape characters with special meaning with a slash(\) e.g.:<\b>\F\r\o\m l jS \of F.</\b><br>see also https://www.php.net/manual/en/datetime.format.php ."
MOD_SIMPLEICALBLOCK_DATEFORMAT_LGEND_HELP="End date format first (date) line. Default: empty, no display.<br>End date will only be shown as date part is different from start date and format not empty."
MOD_SIMPLEICALBLOCK_DATEFORMAT_TSUM_HELP="Start time format summary line. Default: G:i ,<br>G or g = 24 or 12 hour format of an hour without leading zeros<br>i = Minutes with leading zeros<br>a or A = Lowercase or Uppercase Ante meridiem and Post meridiem<br>Use &ldquo;&lt;\b\r&gt;G:i &rdquo; to start at a new line with this field<br>fill with only &lt;&gt; if you don't want to show this field.<br>Linebreak before this field will be removed when summary is before first date line, if desired you can get it back by starting the format with <\b\r><br>This field will only be shown when date part of enddate is equal to start date and format not empty."
MOD_SIMPLEICALBLOCK_DATEFORMAT_TSEND_HELP="End time format summary line. Default: empty , no display."
MOD_SIMPLEICALBLOCK_DATEFORMAT_TSTART_HELP="Time format start time. Default: G:i,<br>G or g = 24 or 12 hour format of an hour without leading zeros<br>i = Minutes with leading zeros<br>a or A = Lowercase or Uppercase Ante meridiem and Post meridiem<br>fill with only &lt;&gt; if you don't want to show start time.<br>You can also use other text to embellish it<br>escape characters with special meaning with a slash(\) e.g.:\F&bsol;r\o\m G:i .<br>This field will only be shown when date part of enddate is equal to start date and format not empty."
MOD_SIMPLEICALBLOCK_DATEFORMAT_TEND_HELP="Time format separator and end time. Default:  - G:i,<br>G or g = 24 or 12 hour format of an hour without leading zeros<br>i = Minutes with leading zeros<br>a or A = Lowercase or Uppercase Ante meridiem and Post meridiem<br>fill with only &lt;&gt; if you don't want to show end time.<br>You can also use other text to embellish it<br>escape characters with special meaning with a slash(\)e.g.: &bsol;t\o G:i .<br>This field will only be shown when date part of enddate is equal to start date and format not empty."
MOD_SIMPLEICALBLOCK_TRANSIENT_TIME_HELP="Minimal time in minutes between reads from calendar source."
MOD_SIMPLEICALBLOCK_EXCERPTLENGTH_HELP="Max length of the description in characters.<br>If there is a space or end-of-line character within 10 characters of this end, break there.<br>Note, not all characters have the same width, so the number of lines is not completely fixed by this. So you need additional CSS for that.<br><b>Warning:</b> If you allow html in the description, necessary end tags may disappear here.<br> Default: empty, all characters will be displayed"
MOD_SIMPLEICALBLOCK_ERRORLOG_HELP="If a request to retrieve calendar data fails, a message is generated.<br>From version 3.0.0 onwards, the standard Joomla logging is used for this with the category 'xbsimple-ical' and<br>generally with the priority NOTICE or WARNING, but other priorities may be added later.<br><br>The global configuration allows you to specify which messages are logged and where the log files are located.<br>With the System-Debug module, the messages can be displayed on the front-end if desired.<br>See: https://docs.joomla.org/Using_JLog"

MOD_SIMPLEICALBLOCK_CAT_FL_OP_HELP="<p>Here you can choose how to compare the filter categories with the event categories.</p><li>Default: Empty no filtering.</li><li>ANY is true if at least one of the elements of the filter set is present in the event set, or in other words the filter set intersects the event set, the intersection contains at least one element. This seems to me to be the most practical operator.</li><li>ALL is true if all elements of the filter set exist in the event set, or in other words, the intersection contains the same number of elements as the filter set. The event set can contain other elements.</li><li>NOTANY is true if ANY is NOT true. The intersection is empty.</li><li>NOTALL is true if ALL is NOT true. The intersection contains fewer elements than the filter set.</li><p>A special case are events without categories. In the filter, the plugin handles this as if the category were a null string ('').</p>"
MOD_SIMPLEICALBLOCK_CAT_FILTER_HELP="<p>List of filter categories separated by a comma (not in double quotes). If a category contains a comma, you must add a backslash (\,) to it. A null string is created as a category if nothing is entered in the list or if the list ends with a comma, or if there are two comma separators immediately next to each other.</p><p>Categories (at least in this plugin) behave like simple tags and have no intrinsic meaning or relationship. So if you want to select all events with category flower, rose or tulip, you have to add them all to the filter list. With category flower, you don\'t automatically select rose and tulip too.</p>"
MOD_SIMPLEICALBLOCK_CAT_DSP_HELP="<p>Default: Empty, categories are not displayed. Here you can choose to display the list of event categories after the summary and with what separator. If you leave this field empty, the list will not be displayed.</p>"        
MOD_SIMPLEICALBLOCK_ADDSUMCATFLT_HELP="Add words from summary (separated by space or comma) to categories for filtering"

MOD_SIMPLEICALBLOCK_PER_LIMITS_HELP="Determination of start and end time of periode where events are displayed.<br>Whole day: start at start of today, end at end of last day.<br>Time of day: Start now, end at same time last day."
MOD_SIMPLEICALBLOCK_TAG_SUM_HELP="Tag for summary. Choose a tag from the list. Default: a (link)<br>When using bootstrap or other collapse css and java-script the description is collapsed and wil be opened bij clicking on the summary link.<br>Link is not included with the other tags.<br>A similar effect in pure HTML (without dedicated javascript or css) can be obtained with the summary tag<br>this wil be included on top of the details in a details tag. On start only a disclosure<br> widget (in most browsers a small triangle) and the summary text is shown.<br>clicking on the widget or summary opens the details text.<br>If not using bootstrap h4, summary strong or div may be a better choice then a.."
MOD_SIMPLEICALBLOCK_SUFFIX_LG_CLASS_HELP="Suffix to add after css-class around the event (list-group),<br>start with space to keep the original class and add another class."
MOD_SIMPLEICALBLOCK_SUFFIX_LGI_CLASS_HELP="Suffix to add after the css-class around the event start line (list-group-item),<br>start with space to keep the original class and add another class.<br>E.g.:  py-0 with leading space; standard bootstrap 4 class to set padding top and bottom  to 0;  ml-1 to set margin left to 0.25 rem"
MOD_SIMPLEICALBLOCK_SUFFIX_LGIA_CLASS_HELP="Suffix to add after the css-class around the event details link (ical_details),<br>start with space to keep the original class and add another class."
MOD_SIMPLEICALBLOCK_ALLOWHTML_HELP="Check checkbox to allow the use of some safe html in description and summary,<br>otherwise it will only be displayed as text."
MOD_SIMPLEICALBLOCK_AFTER_EVENTS_HELP="Closing (safe) HTML after events list, when events are available.<br>This text with simple HTML will be displayed after the events list.<br>Use &amp;lt; or &amp;gt; if you want to output &lt; or &gt; otherwise they may be removed as unknown and therefore unsafe tags.<br>E.g. &lt;hr class=&quot;module-ft&quot;	&gt;"
MOD_SIMPLEICALBLOCK_NO_EVENTS_HELP="Closing (safe) HTML output when no events are available.<br>This text with simple HTML will be displayed instead of the events list.<br>Use &amp;lt; or &amp;gt; if you want to output &lt; or &gt; otherwise they may be removed as unknown and therefore unsafe tags.<br>E.g. &lt;p  class=&quot;warning&quot; &gt;&amp;lt; No events found. &amp;gt;&lt;\p&gt;&lt;hr class=&quot;module-ft&quot;&gt;"
MOD_SIMPLEICALBLOCK_CLEAR_CACHE_NOW_HELP="Check checkbox to clear calendar cache on save of settings, otherwise it will be cleared after cache time is expired."
MOD_SIMPLEICALBLOCK_ANCHORID_HELP="HTML anchor for this block.<br>Type one or two words - no spaces - to create a unique web address for this block, called an &ldquo;anchor&rdquo; Then you can link directly to this section on your page.<br>You can als use this ID to make parts of your extra css specific for this block"
MOD_SIMPLEICALBLOCK_COLL_LBL="How to hide/collapse (parts of) the module"
MOD_SIMPLEICALBLOCK_COLL_HELP="If the template does not supports the bootstrap collapse component choose yes for 'Add collapse code'. So that the necessary code is available. Choose 'start collapsed' or 'start open' in the select list of 'Title as collapse toggle', or make your own 'Collapse toggle button in a custom (html) module e.g.: &lt;button class=&quot;btn btn-primary&quot; type=&quot;button&quot; data-bs-toggle=&quot;collapse&quot; data-bs-target=&quot;.sib1&quot; aria-expanded=&quot;false&quot; aria-controls=&quot;collapseExample&quot;&gt; Button to collapse/toggle class sib1 &lt;/button&gt; where sib1 is the class you want to show/collapse. Add also a class collapse to the html tag with the class sib1, or add class(es collapse and) show to this tag and change aria-expanded=&quot;false&quot; in aria-expanded=&quot;true&quot; in the custom html module. For a more detailed explanation see https://getbootstrap.com/docs/5.3/components/collapse/ or https://docs.joomla.org/J4.x:Using_Bootstrap_Components_in_Joomla_4#Collapse<br>Attention, if the component is already present, adding it may undo the operation (toggling twice will return you to the starting situation)"       
MOD_SIMPLEICALBLOCK_TITLE_COLL_TGL_HELP="Use title link as collapse/show toggle for this module content."
MOD_SIMPLEICALBLOCK_ADD_COLLAPSE_CODE_HELP="Add bootstrap collapse code (js and css) when not provided by template"
MOD_SIMPLEICALBLOCK_LAYOUT_HELP="&ldquo;Default&rdquo; Content is composed on server with timezone-settings of Joomla installation<br>&ldquo;Client-timezone-rest&rdquo; At first a placeholder is created, after loading page content is fetched via a Rest call with timezone-settings client browser<br>you can optionally create an other layout in the template; see Joomla documentation."
